<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adil Hussain</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --btn-gradient: linear-gradient(135deg, #2d2d2d 0%, #000000 100%);
            --btn-hover: linear-gradient(135deg, #505050 0%, #2d2d2d 100%);
            --text-light: #ffffff;
            --bg-main: #ffffff;
            --container-padding: 24px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            color: #000;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .wrapper {
            width: 100%;
            max-width: 600px; /* Limits width on desktop for readability */
            padding: 40px var(--container-padding);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Profile Header */
        .profile-img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: #f0f0f0;
            margin-bottom: 16px;
            object-fit: cover;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .description {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 40px;
            text-align: center;
        }

        /* Full-Width Buttons */
        .links-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 20px;
            border-radius: 16px; /* Smooth rounded corners */
            background: var(--btn-gradient);
            color: var(--text-light);
            text-decoration: none;
            text-align: center;
            font-weight: 500;
            font-size: 1rem;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        /* Desktop Hover & Mobile Active States */
        @media (hover: hover) {
            .btn:hover {
                transform: scale(1.02);
                background: var(--btn-hover);
                box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
            }
        }

        .btn:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        /* Sub-info for buttons (optional) */
        .btn span {
            display: block;
            font-size: 0.75rem;
            opacity: 0.7;
            margin-top: 4px;
            font-weight: 400;
        }

        footer {
            margin-top: auto;
            padding-top: 50px;
            font-size: 0.75rem;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <img src="https://ugc.production.linktr.ee/yGDbBKIATIifA82RbIE7_Nl1b6Kt6z5vz671k" alt="Adil Hussain" class="profile-img">
        
        <h1>Adil Hussain</h1>
        <p class="description">Contact & Social Profiles</p>

        <div class="links-container">
            <a href="tel:+919797289770" class="btn" style="background: linear-gradient(135deg, #d32f2f 0%, #9a0007 100%);">
                Emergency Call
                <span>+91 9797289770</span>
            </a>

            <a href="https://wa.me/919797289770" target="_blank" class="btn">
                WhatsApp
            </a>

            <a href="mailto:adilhshaw@gmail.com" class="btn">
                Email
                <span>adilhshaw@gmail.com</span>
            </a>

            <a href="https://en.wikipedia.org/wiki/User:Adilalishah" target="_blank" class="btn">
                Wikipedia
            </a>

            <a href="http://twitter.com/thatseharkhan" target="_blank" class="btn">
                Twitter / X
            </a>

            <a href="http://facebook.com/thatseharkhan" target="_blank" class="btn">
                Facebook
            </a>
        </div>

        <footer>
            Adil Hussain • 2026
        </footer>
    </div>

</body>
</html>
