<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Linear Timeline Calendar Generator</title>

<link rel="stylesheet" href="styling.css">

</head>

<body>

<header>

<h1>Linear Timeline Calendar Generator</h1>

<p>
Print landscape · scale 100% · stitch along short edges
</p>

<div class="toolbar">

<label>Year</label>

<input
type="number"
id="yearInput"
value="2026"
min="1900"
max="2100"
>

<label>
<input type="checkbox" id="holidayToggle">
Show Indian holidays
</label>

<button onclick="generateCalendar()">
Generate calendar
</button>

<button onclick="window.print()">
Export PDF
</button>

</div>

</header>

<main>

<div id="calendarContainer"></div>

</main>

<script src="script.js"></script>

</body>
</html>
